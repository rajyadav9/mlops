name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (defaults to current SHA)"
        required: false
        default: ""

permissions:
  id-token: write   # OIDC token for aws-actions/configure-aws-credentials
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
  EKS_CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME }}
  IMAGE_TAG: ${{ github.event.inputs.image_tag || github.sha }}

jobs:
  # ── Build & Push GPU image to ECR ─────────────────────────────────────────
  build-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC — no long-lived keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push GPU image
        id: meta
        uses: docker/build-push-action@v5
        with:
          context: docker/
          file: docker/Dockerfile
          push: true
          # Tag with both the commit SHA (immutable) and latest (convenience)
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          # Layer cache from GHA — cuts rebuild time ~60% on unchanged layers
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Provenance attestation for supply-chain compliance
          provenance: true
          sbom: true

      - name: Output image ref
        run: |
          echo "image=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}" \
            >> $GITHUB_OUTPUT

  # ── Rolling deploy to EKS ─────────────────────────────────────────────────
  deploy:
    name: Rolling Deploy to EKS
    runs-on: ubuntu-latest
    needs: build-push
    environment: production   # requires manual approval in GitHub Environments

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region "${{ env.AWS_REGION }}" \
            --name "${{ env.EKS_CLUSTER_NAME }}"

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/vllm/serviceaccount.yaml
          kubectl apply -f k8s/vllm/service.yaml
          kubectl apply -f k8s/vllm/ingress.yaml

      - name: Update image and trigger rolling deploy
        run: |
          IMAGE="${{ needs.build-push.outputs.image }}"
          kubectl set image deployment/vllm \
            vllm="${IMAGE}" \
            --namespace vllm

          echo "Waiting for rollout..."
          kubectl rollout status deployment/vllm \
            --namespace vllm \
            --timeout=10m

      - name: Verify deployment
        run: |
          kubectl get pods -n vllm -l app.kubernetes.io/name=vllm
          # Wait for at least one ready pod before calling success
          kubectl wait pod \
            --namespace vllm \
            --for=condition=Ready \
            --selector=app.kubernetes.io/name=vllm \
            --timeout=5m

      - name: Smoke test against live service
        run: |
          # Get ALB endpoint from Ingress
          LB_URL=$(kubectl get ingress vllm -n vllm \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          echo "Load balancer: ${LB_URL}"
          timeout 60 bash -c "until curl -sf http://${LB_URL}/health; do sleep 5; done"
          bash scripts/test-api.sh "http://${LB_URL}"

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Deployment failed — rolling back"
          kubectl rollout undo deployment/vllm --namespace vllm
