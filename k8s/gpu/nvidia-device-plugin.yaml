# NVIDIA Device Plugin DaemonSet
# Makes nvidia.com/gpu resources visible to the Kubernetes scheduler.
# The AL2_x86_64_GPU AMI ships NVIDIA drivers; this plugin bridges the driver to K8s.
#
# Local (kind, CPU-only): this DaemonSet is a no-op — GPU resources won't be advertised
# and the vLLM Deployment runs with --device cpu. That is expected.
#
# Apply: kubectl apply -f k8s/gpu/nvidia-device-plugin.yaml

apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nvidia-device-plugin
  namespace: kube-system
  labels:
    app.kubernetes.io/name: nvidia-device-plugin
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: nvidia-device-plugin
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nvidia-device-plugin
    spec:
      # Only run on GPU nodes
      nodeSelector:
        node-type: gpu

      tolerations:
        - key: nvidia.com/gpu
          operator: Equal
          value: present
          effect: NoSchedule

      priorityClassName: system-node-critical

      containers:
        - name: nvidia-device-plugin
          image: nvcr.io/nvidia/k8s-device-plugin:v0.14.5
          args: ["--fail-on-init-error=false"]
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: device-plugin
              mountPath: /var/lib/kubelet/device-plugins

      volumes:
        - name: device-plugin
          hostPath:
            path: /var/lib/kubelet/device-plugins
