apiVersion: v1
kind: Service
metadata:
  name: vllm
  namespace: vllm
  labels:
    app.kubernetes.io/name: vllm
    app.kubernetes.io/component: inference
  annotations:
    # Expose Prometheus metrics via ServiceMonitor
    prometheus.io/scrape: "true"
    prometheus.io/port: "8000"
spec:
  selector:
    app.kubernetes.io/name: vllm
  ports:
    - name: http
      port: 80
      targetPort: 8000
      protocol: TCP
  type: ClusterIP
