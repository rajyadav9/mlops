apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm
  namespace: vllm
  labels:
    app.kubernetes.io/name: vllm
    app.kubernetes.io/component: inference
    app.kubernetes.io/version: "0.4.3"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vllm
  strategy:
    type: RollingUpdate
    rollingUpdate:
      # Never have zero healthy pods — inference should always be available
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vllm
        app.kubernetes.io/component: inference
      annotations:
        # Prometheus scrape config
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: vllm

      # Tolerate the GPU taint so pods can land on GPU nodes
      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Equal"
          value: "present"
          effect: "NoSchedule"

      nodeSelector:
        node-type: gpu

      # Prefer spreading across AZs for HA
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: vllm

      initContainers:
        # Pre-pull model weights into the shared emptyDir so the main container
        # starts quickly. In production, mount an EFS PVC pre-populated by a
        # model-download Job instead.
        - name: model-downloader
          image: python:3.11-slim
          command:
            - sh
            - -c
            - |
              pip install --quiet huggingface_hub && \
              python -c "
              from huggingface_hub import snapshot_download
              snapshot_download(
                repo_id='facebook/opt-125m',
                local_dir='/model-cache/facebook/opt-125m',
                ignore_patterns=['*.msgpack','*.h5','flax_*']
              )
              print('Model downloaded successfully')
              "
          env:
            - name: HF_HOME
              value: /model-cache
          volumeMounts:
            - name: model-cache
              mountPath: /model-cache
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"

      containers:
        - name: vllm
          # Production image from ECR — set via CI/CD
          # Local: override with localhost:5001/vllm-inference:local
          image: ACCOUNT_ID.dkr.ecr.REGION.amazonaws.com/vllm-inference:latest
          imagePullPolicy: Always

          ports:
            - name: http
              containerPort: 8000
              protocol: TCP

          args:
            - "--model"
            - "/model-cache/facebook/opt-125m"
            - "--port"
            - "8000"
            - "--host"
            - "0.0.0.0"
            - "--max-model-len"
            - "2048"
            # GPU production flags (active when running on a real GPU node):
            #   --dtype half                    # FP16 for T4
            #   --tensor-parallel-size 1        # 1 GPU per pod for opt-125m
            #   --gpu-memory-utilization 0.90   # leave 10% headroom
            # CPU local flags (active when --device cpu is set):
            - "--device"
            - "cpu"
            - "--dtype"
            - "float32"

          env:
            - name: HF_HOME
              value: /model-cache
            - name: VLLM_WORKER_MULTIPROC_METHOD
              value: spawn

          volumeMounts:
            - name: model-cache
              mountPath: /model-cache

          resources:
            requests:
              cpu: "2"
              memory: "4Gi"
              # GPU production — uncomment:
              # nvidia.com/gpu: "1"
            limits:
              cpu: "4"
              memory: "8Gi"
              # GPU production — uncomment:
              # nvidia.com/gpu: "1"

          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6

          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 3

          startupProbe:
            httpGet:
              path: /health
              port: 8000
            # Model loading can take several minutes on first start
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 30

      volumes:
        - name: model-cache
          emptyDir:
            sizeLimit: 5Gi
            # Production: replace emptyDir with a PVC backed by EFS or gp3 EBS
            # pre-populated by a model-download Job:
            # persistentVolumeClaim:
            #   claimName: model-weights-pvc

      terminationGracePeriodSeconds: 60
