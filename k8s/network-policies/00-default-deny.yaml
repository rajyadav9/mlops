# Default-deny for all application namespaces.
# Applied BEFORE any allow policies — acts as a zero-trust baseline.
#
# Requires: EKS VPC CNI NetworkPolicy support (enabled via aws-node ConfigMap
# enableNetworkPolicy: "true", available from EKS 1.25+) or Calico CNI.
#
# Namespaces covered: vllm, monitoring, keda, aibrix
# kube-system is intentionally excluded — kubelet/coredns must operate freely.
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: vllm
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: monitoring
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: keda
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: aibrix-system
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
