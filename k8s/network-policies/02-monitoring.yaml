# NetworkPolicy for the monitoring stack (Prometheus, Grafana, Loki, Alloy/Promtail, Tempo).
# Prometheus must scrape across namespaces — allowed via per-namespace egress rules.
---
# Prometheus: scrape vLLM, KEDA, nodes; expose /metrics and query API
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: prometheus-allow
  namespace: monitoring
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  policyTypes:
    - Ingress
    - Egress

  ingress:
    # Grafana queries Prometheus API
    - ports:
        - port: 9090
          protocol: TCP
      from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: grafana

    # KEDA Prometheus scaler queries Prometheus
    - ports:
        - port: 9090
          protocol: TCP
      from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: keda

    # AlertManager communication
    - ports:
        - port: 9093
          protocol: TCP
      from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: alertmanager

  egress:
    # DNS
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
      to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns

    # Scrape vLLM pods (port 8000 exposes /metrics)
    - ports:
        - port: 8000
          protocol: TCP
      to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: vllm

    # Scrape KEDA metrics adapter
    - ports:
        - port: 6443
          protocol: TCP
        - port: 8080
          protocol: TCP
      to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: keda

    # Scrape AIBrix components
    - ports:
        - port: 8080
          protocol: TCP
        - port: 9090
          protocol: TCP
      to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: aibrix-system

    # Scrape node-exporter (DaemonSet on host network — use node CIDR)
    - ports:
        - port: 9100
          protocol: TCP
      to:
        - ipBlock:
            cidr: 10.0.0.0/8

    # Scrape DCGM exporter (GPU metrics DaemonSet, host network)
    - ports:
        - port: 9400
          protocol: TCP
      to:
        - ipBlock:
            cidr: 10.0.0.0/8

    # Kubernetes API server (for service discovery via kubernetes_sd_configs)
    - ports:
        - port: 443
          protocol: TCP
      to:
        - ipBlock:
            cidr: 10.0.0.0/8

    # Remote write to Thanos/Cortex sidecar
    - ports:
        - port: 10901
          protocol: TCP
      to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: thanos-sidecar
---
# Grafana: serve dashboard UI, query Prometheus/Loki/Tempo
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: grafana-allow
  namespace: monitoring
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: grafana
  policyTypes:
    - Ingress
    - Egress

  ingress:
    # Internal ALB or ingress controller → Grafana
    - ports:
        - port: 3000
          protocol: TCP
      from:
        - ipBlock:
            cidr: 10.0.0.0/8

  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
      to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
    # Prometheus datasource
    - ports:
        - port: 9090
          protocol: TCP
      to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
    # Loki datasource
    - ports:
        - port: 3100
          protocol: TCP
      to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: loki
    # Tempo datasource
    - ports:
        - port: 3200
          protocol: TCP
      to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: tempo
---
# Loki: ingest logs from Alloy, store to S3 via VPC endpoint
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: loki-allow
  namespace: monitoring
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: loki
  policyTypes:
    - Ingress
    - Egress

  ingress:
    - ports:
        - port: 3100
          protocol: TCP
      from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: alloy
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: grafana

  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
      to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
    # S3 via Gateway VPC endpoint (model storage + Loki chunks)
    - ports:
        - port: 443
          protocol: TCP
      to:
        - ipBlock:
            cidr: 10.0.0.0/8
---
# Alloy (log collector): receive logs, forward to Loki
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: alloy-allow
  namespace: monitoring
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: alloy
  policyTypes:
    - Ingress
    - Egress

  ingress:
    # OTLP traces from instrumented pods (optional)
    - ports:
        - port: 4317
          protocol: TCP

  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
      to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
    # Forward to Loki
    - ports:
        - port: 3100
          protocol: TCP
      to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: loki
    # Kubernetes API (for pod log tailing via kubernetes.logs)
    - ports:
        - port: 443
          protocol: TCP
      to:
        - ipBlock:
            cidr: 10.0.0.0/8
